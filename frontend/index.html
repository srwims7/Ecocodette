<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EcoDette | AI Route Emissions</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Wrapper that centers and styles the app -->
  <div class="app-container">
    <header>
      <h1>EcoDette</h1>
      <p>AI Route Emissions</p>
    </header>

    <main>
      <button id="loadBtn">Load Data</button>

      <div class="card">
        <h2>Total Emissions</h2>
        <p id="total">--</p>
      </div>

      <div class="card">
        <h2>Suggestions</h2>
        <ul id="suggestions"></ul>
      </div>
    </main>

    <footer>
      <p>Built by the Codettes</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
